[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require services)
    bdd: Behavior-driven development tests
    visual: Visual regression tests
    slow: Tests that take longer to run
    regression: Scenarios that guard pre-existing infrastructure (not driving new development)
    deferred: Scenarios documented as design intent but intentionally not implemented (see scenario comment + BACKLOG ticket)
