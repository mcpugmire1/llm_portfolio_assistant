# Streamlit secrets — local-prod parity template.
#
# Copy this file to .streamlit/secrets.toml and fill in real values.
# .streamlit/secrets.toml is gitignored; this template is checked in
# so the required keys are discoverable without reading production code.
#
# Resolution order in get_conf() (config/settings.py):
#   1. st.secrets (this file)
#   2. os.environ (loaded via .env at app startup)
#
# Convention in this codebase:
#   - External service API keys (OpenAI, Pinecone) → .env
#   - App-level auth + Streamlit Cloud parity (GCP, password gate) → secrets.toml
#
# Prod values for everything below live in the Streamlit Cloud secrets UI.

# App-level auth — password gate for Role Match private view (MATTGPT-012).
# Local dev value matches the BYPASS_TOKEN fixture in
# tests/bdd/steps/test_role_match.py so the lock-glyph BDD tests can unlock.
# Restart Streamlit after changing this value (secrets are loaded at startup).
MATTGPT_PRIVATE_BYPASS_TOKEN = "test-bypass-token"

# Google Cloud service account for Google Sheets query logger
# (services/query_logger.py). Generate via GCP Console:
#   IAM & Admin → Service Accounts → mattgpt-logger@... → Keys → Add Key → Create New
# Paste the JSON values into the fields below. All fields are required.
[gcp_service_account]
type = "service_account"
project_id = "YOUR-PROJECT-ID"
private_key_id = "YOUR-PRIVATE-KEY-ID"
private_key = "-----BEGIN PRIVATE KEY-----\nYOUR-KEY-HERE\n-----END PRIVATE KEY-----\n"
client_email = "YOUR-SERVICE-ACCOUNT@YOUR-PROJECT.iam.gserviceaccount.com"
client_id = "YOUR-CLIENT-ID"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/YOUR-SERVICE-ACCOUNT%40YOUR-PROJECT.iam.gserviceaccount.com"
universe_domain = "googleapis.com"
